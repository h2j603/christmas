<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lettering Tool</title>
    <meta name="description" content="펜 툴 기반 레터링 도구 — 앵커 배치, 베지어 핸들 편집, SVG 내보내기">
    <meta name="theme-color" content="#111113">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✍</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div id="canvas-area">
            <canvas id="drawCanvas"></canvas>
            <div id="canvas-info">
                <span id="canvasInfoText">1080 × 1080</span>
                <span id="zoomLevel">100%</span>
                <span id="pathCount">paths: 0</span>
            </div>
        </div>

        <section id="controls">
            <div class="scroll-container">

                <!-- Tool Bar -->
                <div class="tool-bar">
                    <button class="tool-btn active" data-tool="pen" title="펜 (P) — 앵커 배치">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 14L5 13L13 5C13.6 4.4 13.6 3.6 13 3L13 3C12.4 2.4 11.6 2.4 11 3L3 11L2 14Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="5" cy="13" r="1.5" fill="currentColor"/></svg>
                    </button>
                    <button class="tool-btn" data-tool="select" title="선택 (V) — 앵커/핸들 편집">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 1L2 12L5.5 8.5L8.5 14L10.5 13L7.5 7L12 6.5L2 1Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </button>
                    <div class="tool-separator"></div>
                    <button class="tool-btn" id="closePathBtn" title="패스 닫기 (Enter)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M6 8H10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    </button>
                    <button class="tool-btn" id="fitBtn" title="화면 맞추기 (0)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="1" stroke="currentColor" stroke-width="1.3"/><path d="M5 8H11M8 5V11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                    </button>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button id="undoBtn" class="btn-action">UNDO</button>
                    <button id="redoBtn" class="btn-action">REDO</button>
                    <button id="clearBtn" class="btn-action danger">CLEAR</button>
                </div>

                <div class="quick-actions">
                    <button id="exportSvgBtn" class="btn-action primary">SVG</button>
                    <button id="exportPngBtn" class="btn-action">PNG</button>
                    <button id="fullscreenBtn" class="btn-action">FULL</button>
                </div>

                <a href="../" class="tool-nav-link">
                    <span class="tool-nav-icon">🔲</span>
                    <span class="tool-nav-text"><strong>Text Mosaic</strong> — 텍스트 모자이크 생성기</span>
                    <span class="tool-nav-arrow">→</span>
                </a>

                <!-- PATH PROPERTIES -->
                <details class="section-collapsible" open>
                    <summary class="section-toggle"><h2>PATH</h2></summary>
                    <div class="section-body">
                        <div class="field">
                            <label>FILL COLOR</label>
                            <div class="color-input-wrap">
                                <input type="color" id="fillColor" value="#e8e8ec">
                            </div>
                        </div>
                        <div class="field">
                            <label>FILL OPACITY <span class="val" id="fillOpacityVal">1.0</span></label>
                            <input type="range" id="fillOpacity" min="0" max="100" value="100">
                        </div>
                        <div class="field">
                            <label>
                                <input type="checkbox" id="showFill" checked> SHOW FILL
                            </label>
                        </div>
                        <div class="field">
                            <label>
                                <input type="checkbox" id="showStroke" checked> SHOW OUTLINE
                            </label>
                        </div>
                    </div>
                </details>

                <!-- SHAPES -->
                <details class="section-collapsible" open>
                    <summary class="section-toggle"><h2>SHAPES</h2></summary>
                    <div class="section-body">
                        <div class="quick-actions">
                            <button class="btn-action" onclick="_letteringAddRect()">RECT (R)</button>
                            <button class="btn-action" onclick="_letteringAddEllipse()">ELLIPSE (O)</button>
                        </div>
                        <button class="btn-action" onclick="_letteringUnion()" style="margin-top:4px">UNION (PATHFINDER)</button>
                    </div>
                </details>

                <!-- PATHS LIST -->
                <details class="section-collapsible" open>
                    <summary class="section-toggle"><h2>PATHS</h2></summary>
                    <div class="section-body">
                        <div id="pathList" class="path-list"></div>
                        <button id="newPathBtn" class="btn-action" style="margin-top:4px">+ NEW PATH</button>
                    </div>
                </details>

                <!-- REFERENCE IMAGE -->
                <details class="section-collapsible">
                    <summary class="section-toggle"><h2>REFERENCE IMAGE</h2></summary>
                    <div class="section-body">
                        <label for="refImageInput" class="btn-action upload-btn" tabindex="0" role="button">LOAD REFERENCE</label>
                        <input type="file" id="refImageInput" accept="image/*" style="display:none">
                        <div class="field">
                            <label>OPACITY <span class="val" id="refOpacityVal">0.30</span></label>
                            <input type="range" id="refOpacity" min="0" max="100" value="30">
                        </div>
                        <button id="removeRefBtn" class="btn-action danger">REMOVE</button>
                    </div>
                </details>

                <!-- CANVAS SETTINGS -->
                <details class="section-collapsible">
                    <summary class="section-toggle"><h2>CANVAS</h2></summary>
                    <div class="section-body">
                        <div class="preset-grid" style="margin-bottom:6px">
                            <button class="size-preset-btn" data-w="1080" data-h="1080">1080²</button>
                            <button class="size-preset-btn" data-w="1000" data-h="1000">1000²</button>
                            <button class="size-preset-btn" data-w="1080" data-h="1920">1080×1920</button>
                            <button class="size-preset-btn" data-w="2048" data-h="2048">2048²</button>
                        </div>
                        <div class="row-2">
                            <div class="field">
                                <label>WIDTH</label>
                                <input type="number" id="canvasW" value="1080" min="100" max="4096">
                            </div>
                            <div class="field">
                                <label>HEIGHT</label>
                                <input type="number" id="canvasH" value="1080" min="100" max="4096">
                            </div>
                        </div>
                        <div class="field">
                            <label>BG COLOR</label>
                            <div class="color-input-wrap">
                                <input type="color" id="bgColor" value="#0c0c0e">
                            </div>
                        </div>
                        <button id="resizeBtn" class="btn-action" style="margin-top:4px">APPLY SIZE</button>
                    </div>
                </details>

                <!-- GUIDES -->
                <details class="section-collapsible">
                    <summary class="section-toggle"><h2>GUIDES</h2></summary>
                    <div class="section-body">
                        <div class="field">
                            <label><input type="checkbox" id="showGrid"> GRID</label>
                        </div>
                        <div class="field">
                            <label>GRID SIZE <span class="val" id="gridSizeVal">50</span></label>
                            <input type="range" id="gridSize" min="10" max="200" value="50">
                        </div>
                        <div class="field">
                            <label><input type="checkbox" id="snapGrid"> SNAP TO GRID</label>
                        </div>
                    </div>
                </details>

            </div>
        </section>
    </div>

    <!-- Fullscreen overlay -->
    <div id="fullscreen-view" class="hidden">
        <canvas id="fullscreenCanvas"></canvas>
        <button id="closeFullscreen" class="close-btn" aria-label="닫기">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 1L17 17M17 1L1 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
    </div>

    <script src="sketch.js"></script>
</body>
</html>
